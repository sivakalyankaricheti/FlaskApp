name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  docker:
    runs-on: ubuntu-latest
    needs: test   # run only if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t flaskapp .
  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flaskapp .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/flaskapp
- name: Login Docker Hub
  run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

- name: Login Private Registry
  run: docker login myregistry.com -u ${{ secrets.REG_USER }} -p ${{ secrets.REG_PASS }}

- name: Build Image
  run: docker build -t flaskapp .

- name: Tag images
  run: |
    docker tag flaskapp ${{ secrets.DOCKER_USERNAME }}/flaskapp
    docker tag flaskapp myregistry.com/flaskapp

- name: Push both
  run: |
    docker push ${{ secrets.DOCKER_USERNAME }}/flaskapp
    docker push myregistry.com/flaskapp

jobs:
  test:
  docker:
    needs: test
- name: Send email on failure
  if: failure()
  uses: dawidd6/action-send-mail@v3
  with:
    server_address: smtp.gmail.com
    server_port: 587
    username: ${{ secrets.EMAIL_USER }}
    password: ${{ secrets.EMAIL_PASS }}
    subject: "CI Failed"
    body: "Tests failed in CI pipeline"
    to: kalyankaricheti@gmail.com
    from: GitHub Actions
